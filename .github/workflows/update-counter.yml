name: Dynamic Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate statistics
        run: |
          rm -f platform.txt language.txt

          total=0

          # -------------------------
          # PLATFORM-wise
          # -------------------------
          for platform in */ ; do

            case "$platform" in
              .github/|Templates/|.git/) continue ;;
            esac

            count=$(find "$platform" -mindepth 2 -type d 2>/dev/null | wc -l)

            if [ "$count" -gt 0 ]; then
              echo "${platform%/}: $count" >> platform.txt
              total=$((total + count))
            fi
          done

          # -------------------------
          # LANGUAGE-wise
          # -------------------------
          declare -A lang_map

          for dir in $(find . -mindepth 2 -type d); do

            if [[ "$dir" == *".git"* ]]; then
              continue
            fi

            lang=$(basename "$dir")

            case "$lang" in
              C|C++|Java|Python)
                count=$(find "$dir" -mindepth 1 -type d | wc -l)
                lang_map["$lang"]=$((lang_map["$lang"] + count))
                ;;
              *)
                continue
                ;;
            esac
          done

          for key in "${!lang_map[@]}"; do
            if [ "${lang_map[$key]}" -gt 0 ]; then
              printf "%-10s %d\n" "$key" "${lang_map[$key]}" >> language.txt
            fi
          done

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v total="$TOTAL" '
          /<!-- START_STATS -->/ {
            print;
            print "";

            print "<div align=\"center\">";

            print "<h2 style=\"font-size:24px; margin-bottom:10px;\">📊 Live Progress Dashboard</h2>";

            # ---------------- PLATFORM ----------------
            print "<h3 style=\"font-size:18px; margin-top:20px;\">Platform-wise Solved</h3>";
            print "<pre style=\"font-size:15px; line-height:1.6;\">";

            while ((getline line < "platform.txt") > 0) {
              split(line, a, ":");
              printf "✔ %-18s : %5s\n", a[1], a[2];
            }

            print "</pre>";

            # ---------------- LANGUAGE ----------------
            print "<h3 style=\"font-size:18px; margin-top:20px;\">Language-wise Solved</h3>";
            print "<pre style=\"font-size:15px; line-height:1.6;\">";

            while ((getline line < "language.txt") > 0) {
              split(line, a, " ");
              printf "✔ %-18s : %5s\n", a[1], a[2];
            }

            print "</pre>";

            # ---------------- TOTAL KPI CARD ----------------
            print "<div style=\"margin-top:25px; padding:15px; border-radius:12px; background:#0f0f1a;\">";

            print "<div style=\"font-size:14px; letter-spacing:2px; color:#aaa; margin-bottom:5px;\">";
            print "TOTAL SOLVED";
            print "</div>";

            print "<div style=\"font-size:42px; font-weight:800; color:#7C4DFF;\">";
            print "🧮 " total;
            print "</div>";

            print "</div>";

            print "</div>";
            print "";

            next;
          }

          /<!-- END_STATS -->/ {
            print;
            next;
          }

          { print }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "Auto update stats"

          git push
