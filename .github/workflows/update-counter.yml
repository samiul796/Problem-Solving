name: Dynamic Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate statistics
        run: |
          echo "Generating stats..."

          rm -f platform.txt language.txt

          total=0

          # -------------------------
          # PLATFORM-wise
          # -------------------------
          for platform in */ ; do

            case "$platform" in
              .github/|Templates/|.git/) continue ;;
            esac

            count=$(find "$platform" -mindepth 2 -type d 2>/dev/null | wc -l)

            if [ "$count" -gt 0 ]; then
              echo "${platform%/}: $count" >> platform.txt
              total=$((total + count))
            fi
          done

          # -------------------------
          # LANGUAGE-wise
          # -------------------------
          declare -A lang_map

          for dir in $(find . -mindepth 2 -type d); do

            if [[ "$dir" == *".git"* ]]; then
              continue
            fi

            lang=$(basename "$dir")

            case "$lang" in
              C|C++|Java|Python)
                count=$(find "$dir" -mindepth 1 -type d | wc -l)
                lang_map["$lang"]=$((lang_map[$lang] + count))
                ;;
              *)
                continue
                ;;
            esac
          done

          for key in "${!lang_map[@]}"; do
            if [ "${lang_map[$key]}" -gt 0 ]; then
              echo "$key: ${lang_map[$key]}" >> language.txt
            fi
          done

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v total="$TOTAL" '
          BEGIN {
            in_block = 0;
          }

          /<!-- START_STATS -->/ {
            print;
            in_block = 1;

            print "";
            print "<div align=\"center\">";

            print "<div style=\"font-size:24px; font-weight:800; color:#00C2FF;\">";
            print "LIVE STATISTICS DASHBOARD";
            print "</div>";
            print "<br/>";

            print "<pre style=\"font-size:15px; text-align:left; display:inline-block; line-height:1.6;\">";

            # ---------------- PLATFORM ----------------
            print "Platform-wise Solved";
            print "--------------------------------------";

            while ((getline line < "platform.txt") > 0) {
              split(line, a, ":");
              name = a[1];
              val = a[2];

              gsub(/ /, "", val);

              printf "✔ %-18s : %5s\n", name, val;
            }

            print "\nLanguage-wise Solved";
            print "--------------------------------------";

            # ---------------- LANGUAGE ----------------
            while ((getline line < "language.txt") > 0) {
              split(line, a, ":");
              name = a[1];
              val = a[2];

              gsub(/ /, "", val);

              printf "✔ %-18s : %5s\n", name, val;
            }

            print "</pre>";

            # ---------------- TOTAL CARD ----------------
            print "<div style=\"margin-top:18px; padding:12px; border-radius:10px; background:#0f0f1a; display:inline-block;\">";
            print "<div style=\"font-size:13px; letter-spacing:2px; color:#aaa;\">TOTAL SOLVED</div>";
            print "<div style=\"font-size:44px; font-weight:900; color:#7C4DFF;\">🧮 " total "</div>";
            print "</div>";

            print "</div>";
            print "";

            next;
          }

          /<!-- END_STATS -->/ {
            in_block = 0;
            print;
            next;
          }

          {
            if (in_block == 1) next;
            print;
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && echo "No changes" || git commit -m "📊 Auto update stats"

          git push
