name: Update Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate statistics
        id: stats
        run: |
          echo "Calculating stats..."

          # Platform counters
          beecrowd=0
          codeforces=0
          leetcode=0

          # Language counters
          c=0
          cpp=0
          java=0
          python=0

          # Count platforms (problem folders)
          if [ -d "Beecrowd" ]; then
            beecrowd=$(find Beecrowd -mindepth 2 -type d | wc -l)
          fi

          if [ -d "Codeforces" ]; then
            codeforces=$(find Codeforces -mindepth 2 -type d | wc -l)
          fi

          if [ -d "LeetCode" ]; then
            leetcode=$(find LeetCode -mindepth 2 -type d | wc -l)
          fi

          # Count languages based on folder names
          c=$(find . -type f -name "*.c"  | wc -l)
          cpp=$(find . -type f -name "*.cpp" | wc -l)
          java=$(find . -type f -name "*.java" | wc -l)
          python=$(find . -type f -name "*.py" | wc -l)

          total=$((beecrowd + codeforces + leetcode))

          echo "BEECROWD=$beecrowd" >> $GITHUB_ENV
          echo "CODEFORCES=$codeforces" >> $GITHUB_ENV
          echo "LEETCODE=$leetcode" >> $GITHUB_ENV

          echo "C=$c" >> $GITHUB_ENV
          echo "CPP=$cpp" >> $GITHUB_ENV
          echo "JAVA=$java" >> $GITHUB_ENV
          echo "PYTHON=$python" >> $GITHUB_ENV

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v b="${BEECROWD}" \
              -v c="${CODEFORCES}" \
              -v l="${LEETCODE}" \
              -v cc="${C}" \
              -v cp="${CPP}" \
              -v j="${JAVA}" \
              -v p="${PYTHON}" \
              -v t="${TOTAL}" '
          BEGIN {inside=0}
          /<!-- START_STATS -->/ {
            print;
            inside=1;
            print "";
            print "## 📊 Statistics";
            print "";
            print "### Platform-wise";
            print "";
            print "- Beecrowd: " b;
            print "- Codeforces: " c;
            print "- LeetCode: " l;
            print "";
            print "### Language-wise";
            print "";
            print "- C: " cc;
            print "- C++: " cp;
            print "- Java: " j;
            print "- Python: " p;
            print "";
            print "### Total Solved";
            print "";
            print "- " t;
            print "";
            next
          }
          /<!-- END_STATS -->/ {
            inside=0
          }
          inside==0 {print}
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && echo "No changes" || git commit -m "📊 Auto update statistics"

          git push
