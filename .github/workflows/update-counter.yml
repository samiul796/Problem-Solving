name: Update Problem Counter

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  count-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count all .cpp files inside "beecrowd (C++)"
        id: count
        run: |
          folder="beecrowd (C++)"
          if [ -d "$folder" ]; then
            count=$(find "$folder" -type f -name "*.cpp" 2>/dev/null | wc -l)
          else
            count=0
          fi
          echo "TOTAL_SOLVED=$count" >> $GITHUB_ENV
          echo "Found $count C++ files"

      - name: Update README.md with the new count
        run: |
          sed -i "s/🔢 \*\*Total Solved:\*\* [0-9]*/🔢 **Total Solved:** ${{ env.TOTAL_SOLVED }}/" README.md

      - name: Commit and push changes using PAT
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update solved problem count [skip ci]"
          git push
