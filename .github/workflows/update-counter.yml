name: Dynamic Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate statistics
        run: |
          echo "Generating stats..."

          rm -f platform.txt language.txt

          total=0

          # -------------------------
          # PLATFORM-wise
          # -------------------------
          for platform in */ ; do

            case "$platform" in
              .github/|Templates/|.git/) continue ;;
            esac

            count=$(find "$platform" -mindepth 2 -type d 2>/dev/null | wc -l)

            if [ "$count" -gt 0 ]; then
              echo "${platform%/}: $count" >> platform.txt
              total=$((total + count))
            fi
          done

          # -------------------------
          # LANGUAGE-wise
          # -------------------------
          declare -A lang_map

          for dir in $(find . -mindepth 2 -type d); do

            if [[ "$dir" == *".git"* ]]; then
              continue
            fi

            lang=$(basename "$dir")

            case "$lang" in
              C|C++|Java|Python)
                count=$(find "$dir" -mindepth 1 -type d | wc -l)
                lang_map["$lang"]=$((lang_map["$lang"] + count))
                ;;
              *)
                continue
                ;;
            esac
          done

          for key in "${!lang_map[@]}"; do
            if [ "${lang_map[$key]}" -gt 0 ]; then
              echo "$key: ${lang_map[$key]}" >> language.txt
            fi
          done

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v total="$TOTAL" '
          /<!-- START_STATS -->/ {
            print;
            print "";

            print "<div align=\"center\">";
            print "";

            print "<span style=\"font-size:20px; font-weight:bold;\">";
            print "Platform-wise Solved";
            print "</span>";
            print "<br/><br/>";

            while ((getline line < "platform.txt") > 0) {
              gsub(/•/, "", line);  # remove any existing bullet
              print "<span style=\"font-size:16px;\">✔️ " line "</span><br/>";
            }

            print "<br/>";

            print "<span style=\"font-size:20px; font-weight:bold;\">";
            print "Language-wise Solved";
            print "</span>";
            print "<br/><br/>";

            while ((getline line < "language.txt") > 0) {
              gsub(/•/, "", line);
              print "<span style=\"font-size:16px;\">✔️ " line "</span><br/>";
            }

            print "<br/>";

            print "<span style=\"font-size:22px; font-weight:bold;\">";
            print "Total Solved: " total;
            print "</span>";

            print "";
            print "</div>";
            print "";

            next;
          }

          /<!-- END_STATS -->/ {
            print;
            next;
          }

          { print }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "Auto update stats"

          git push
