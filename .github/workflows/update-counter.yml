name: Dynamic Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate dynamic stats
        run: |
          echo "Generating stats..."

          rm -f platform.txt language.txt

          total=0

          # -------------------------
          # PLATFORM-wise (dynamic)
          # -------------------------
          for platform in */ ; do
            case "$platform" in
              .github/|Templates/|README.md|.git/) continue ;;
            esac

            count=$(find "$platform" -mindepth 2 -type d 2>/dev/null | wc -l)

            if [ "$count" -gt 0 ]; then
              echo "${platform%/}: $count" >> platform.txt
              total=$((total + count))
            fi
          done

          # -------------------------
          # LANGUAGE-wise (dynamic)
          # -------------------------
          declare -A lang_map

          for dir in $(find . -mindepth 2 -type d); do
            lang=$(basename "$dir")
            count=$(find "$dir" -mindepth 1 -type d | wc -l)

            lang_map["$lang"]=$((lang_map["$lang"] + count))
          done

          for key in "${!lang_map[@]}"; do
            if [ "${lang_map[$key]}" -gt 0 ]; then
              echo "$key: ${lang_map[$key]}" >> language.txt
            fi
          done

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v total="$TOTAL" '
          BEGIN {
            platform_section=0;
            language_section=0;
          }

          /<!-- START_STATS -->/ {
            print;
            print "";
            print "## 📊 Statistics";
            print "";
            print "### Platform-wise";
            print "";

            while ((getline line < "platform.txt") > 0) {
              print "- " line;
            }

            print "";
            print "### Language-wise";
            print "";

            while ((getline line < "language.txt") > 0) {
              print "- " line;
            }

            print "";
            print "### Total Solved";
            print "";
            print "- " total;
            print "";
            next;
          }

          /<!-- END_STATS -->/ {
            print;
            next;
          }

          { print }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && echo "No changes" || git commit -m "📊 Auto update dynamic stats"

          git push
