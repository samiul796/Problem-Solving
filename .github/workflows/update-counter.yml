name: Dynamic Problem Statistics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate statistics
        run: |
          rm -f platform.txt language.txt
          total=0

          # ---------------- PLATFORM ----------------
          for platform in */ ; do
            case "$platform" in
              .github/|Templates/|.git/) continue ;;
            esac

            count=$(find "$platform" -mindepth 2 -type d 2>/dev/null | wc -l)

            if [ "$count" -gt 0 ]; then
              printf "%-18s %d\n" "${platform%/}" "$count" >> platform.txt
              total=$((total + count))
            fi
          done

          # ---------------- LANGUAGE ----------------
          declare -A lang_map

          for dir in $(find . -mindepth 2 -type d); do
            [[ "$dir" == *".git"* ]] && continue

            lang=$(basename "$dir")

            case "$lang" in
              C|C++|Java|Python)
                count=$(find "$dir" -mindepth 1 -type d | wc -l)
                lang_map["$lang"]=$((lang_map["$lang"] + count))
                ;;
            esac
          done

          for key in "${!lang_map[@]}"; do
            printf "%-18s %d\n" "$key" "${lang_map[$key]}" >> language.txt
          done

          echo "TOTAL=$total" >> $GITHUB_ENV

      - name: Update README
        run: |
          awk -v total="$TOTAL" '
          /<!-- START_STATS -->/ {
            print;
            print "";

            print "<div align=\"center\">";

            print "<h2 style=\"font-size:26px; color:#7C4DFF; letter-spacing:1px;\">";
            print "LIVE STATISTICS DASHBOARD";
            print "</h2>";

            # ---------------- PLATFORM ----------------
            print "<h3 style=\"font-size:18px; margin-top:10px;\">Platform-wise Solved</h3>";
            print "<pre style=\"font-size:15px; line-height:1.7;\">";

            while ((getline line < "platform.txt") > 0) {
              split(line, a, " ");
              printf "✔ %-18s : %5s\n", a[1], a[2];
            }

            print "</pre>";

            # ---------------- LANGUAGE ----------------
            print "<h3 style=\"font-size:18px;\">Language-wise Solved</h3>";
            print "<pre style=\"font-size:15px; line-height:1.7;\">";

            while ((getline line < "language.txt") > 0) {
              split(line, a, " ");
              printf "✔ %-18s : %5s\n", a[1], a[2];
            }

            print "</pre>";

            # ---------------- TOTAL CARD ----------------
            print "<div style=\"margin-top:25px; padding:22px; border-radius:14px; background:#0f0f1a; text-align:center;\">";

            print "<div style=\"font-size:16px; letter-spacing:3px; color:#aaa;\">";
            print "TOTAL SOLVED";
            print "</div>";

            print "<div style=\"font-size:64px; font-weight:900; color:#00C2FF; line-height:1.2;\">";
            print "🧮 " total;
            print "</div>";

            print "</div>";

            print "</div>";

            next;
          }

          /<!-- END_STATS -->/ {
            print;
            next;
          }

          { print }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "Auto update stats"

          git push
